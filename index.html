<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Diamond Slice — Order Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F5F0; --surface:#FFFFFF; --ink:#1A1814; --ink2:#6B6760; --ink3:#A8A49E;
  --border:#E4E1DA; --green:#2E6B42; --green-bg:#EAF3EE; --green-border:#B6D9C4;
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
body{padding-bottom:90px}
.header{background:var(--ink);color:#fff;padding:16px 20px 14px;position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header-title{font-size:17px;font-weight:600;letter-spacing:-0.01em}
.header-count{font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.5)}
.header-sub{font-size:12px;color:rgba(255,255,255,0.45)}
.cat-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);padding:18px 20px 7px;background:var(--bg)}
.row{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;min-height:56px;gap:12px;transition:background 0.12s}
.row:active{background:#F5F3EE}
.row.checked{background:var(--green-bg)}
.chk{width:26px;height:26px;min-width:26px;border-radius:50%;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.chk svg{opacity:0;transition:opacity 0.15s}
.row.checked .chk{background:var(--green);border-color:var(--green)}
.row.checked .chk svg{opacity:1}
.iname{flex:1;font-size:15px;color:var(--ink);line-height:1.3;padding:14px 0;cursor:pointer}
.row.checked .iname{color:var(--ink3);text-decoration:line-through;text-decoration-color:var(--ink3)}
.qty-wrap{display:flex;align-items:center;gap:6px;opacity:0;pointer-events:none;transition:opacity 0.15s}
.row.checked .qty-wrap{opacity:1;pointer-events:all}
.qty-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--green);min-width:20px;text-align:center}
.qty-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--green-border);background:var(--green-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--green);line-height:1;flex-shrink:0;user-select:none}
.qty-btn:active{background:var(--green-border)}
.bottom{position:fixed;bottom:0;left:0;right:0;padding:10px 16px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.bottom-info{font-size:13px;color:var(--ink2);flex:1;line-height:1.3}
.bottom-info strong{color:var(--ink);font-weight:600}
.btn-reset{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;font-size:13px;color:var(--ink3);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-copy{padding:12px 20px;border-radius:10px;border:none;background:var(--ink);font-size:14px;font-weight:600;color:#fff;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.btn-copy:active{background:#333}
.btn-copy.ok{background:var(--green)}
.btn-copy:disabled{opacity:0.35;cursor:default}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <span class="header-title">🍕 Diamond Slice Order</span>
    <span class="header-count" id="hcount">0 checked</span>
  </div>
  <div class="header-sub">Check what's needed → Copy → Send as text</div>
</div>
<div id="list"></div>
<div class="bottom">
  <div class="bottom-info" id="binfo">Tap items to add to order</div>
  <button class="btn-reset" onclick="resetAll()">Reset</button>
  <button class="btn-copy" id="copyBtn" onclick="copyList()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Copy &amp; Send
  </button>
</div>
<script>
const SECTIONS = [
  {name:'Cheese', items:['Gruyere','Mascarpone','Mozz low-moisture (Grande)','Mozz whole milk fresh (Grande)','Grana Padano','Ricotta impastata','Pecorino Romano']},
  {name:'Dairy', items:['Butter unsalted','Heavy cream','Eggs XL','Whole milk','Sour cream']},
  {name:'Produce', items:['Basil','Celery','Chives','Dill','Garlic peeled','Romaine','Mushrooms medium','Mushrooms mixed','Scallions','Red onion','Yellow onion','Jalapeño','Shallots']},
  {name:'Canned & Dry Goods', items:['Corn (canned)','Tomato passata','Whole plum tomatoes','Anchovy paste','Lady fingers','Bread crumbs fine','Bread crumbs medium','Semolina flour (Gold Medal)','Semolina flour (Caputo)','Bread flour (King Arthur)','Hot honey',"Mayo (Hellmann's)",'Black olives sliced','Cavatappi','Linguine','Rigatoni','Calabrese peppers (whole)','Calabrian peppers (chopped)','Chipotle peppers','Kosher salt','Sea salt fine',"BBQ sauce (Ken's)","Frank's hot sauce",'Garlic granulated','Garlic powder shaker','Garlic powder (McCormick)','Onion powder','Oregano','Parsley flakes','Red pepper flakes (jug)','Red pepper flakes (shaker)','Sesame seeds','Sugar']},
  {name:'Oils & Shortening', items:['EVOO (Corto)','Pam spray','Frying oil blend (La Padella)','Soybean oil','Frying shortening']},
  {name:'Meat & Poultry', items:['Bacon','Ground pork 80/20','Chicken breast','Pepperoni 38mm cup-char (Ezzo)','Pepperoni 35mm (Rosa Grande)','Pepperoni 8-ct (Rosa Grande)']},
  {name:'Beverages', items:['Aranciata Rossa','Red Bull sugar-free','Mandarin sparkling','Pomegranate sparkling','Blood orange soda','Limonata','Coke Mexican glass','Diet Coke','Coke Zero','Dr Pepper can','Dr Pepper bottle','Sprite Mexican glass','Fanta orange Mexican glass',"Lemon juice (Natalie's)",'San Pellegrino glass','San Pellegrino plastic','Poland Spring','Acqua Panna']},
  {name:'Cleaning', items:['Bleach','Floor cleaner (Mr. Clean)','Dish soap','Pot & pan soap (Dawn)']},
  {name:'Paper & Disposables', items:['Grocery bags','Shopping bags','Pizza box 12" Kraft (Waxzie)','Pizza box 12" white cafe','Pizza box 16" Kraft cafe','Pizza box 16" white cafe','Pizza box 16" plain Kraft','Pizza box 20" white','Pizza box liners 20"','Deli containers 8oz','Food wrap 24"','Food wrap 12"','Forks black','Knives black','Latex gloves L','Latex gloves M','Nitrile gloves S','Nitrile gloves XL','Trash liners 33 GA','Trash liners 56 GA','Trash liners 60 GA clear','Napkins interfold','Napkins low fold','Napkins tall fold','Paper plates 9"','Straws jumbo PLA','Toilet paper','Paper towel C-fold 2ply','Paper towel C-fold 1ply','Paper towel roll 170sh','Paper towel C-fold bagasse','Paper towel roll 85sh','Paper towel roll 128sh (Scott)','Wax paper']},
];
let state={};
try{state=JSON.parse(localStorage.getItem('ds_state')||'{}');}catch(e){}
function key(si,ii){return si+'_'+ii;}
function save(){try{localStorage.setItem('ds_state',JSON.stringify(state));}catch(e){}}
function render(){
  const list=document.getElementById('list');
  list.innerHTML='';
  SECTIONS.forEach((sec,si)=>{
    const c=document.createElement('div');
    c.className='cat-label';c.textContent=sec.name;list.appendChild(c);
    sec.items.forEach((item,ii)=>{
      const k=key(si,ii);
      if(!state[k])state[k]={checked:false,qty:1};
      const st=state[k];
      const row=document.createElement('div');
      row.className='row'+(st.checked?' checked':'');
      row.innerHTML=`<div class="chk" onclick="toggle('${k}')"><svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="iname" onclick="toggle('${k}')">${item}</div><div class="qty-wrap"><div class="qty-btn" onclick="changeQty('${k}',-1)" style="font-size:22px">−</div><div class="qty-num" id="qn_${k}">${st.qty>1?'x'+st.qty:''}</div><div class="qty-btn" onclick="changeQty('${k}',1)">+</div></div>`;
      list.appendChild(row);
    });
  });
  updateBar();
}
function toggle(k){
  state[k].checked=!state[k].checked;
  if(!state[k].checked)state[k].qty=1;
  save();
  const row=document.querySelector(`[onclick="toggle('${k}')"]`).closest('.row');
  row.classList.toggle('checked',state[k].checked);
  const el=document.getElementById('qn_'+k);
  if(el)el.textContent=state[k].qty>1?'x'+state[k].qty:'';
  updateBar();
}
function changeQty(k,d){
  state[k].qty=Math.max(1,state[k].qty+d);
  save();
  const el=document.getElementById('qn_'+k);
  if(el)el.textContent=state[k].qty>1?'x'+state[k].qty:'';
  updateBar();
}
function updateBar(){
  const n=Object.values(state).filter(v=>v.checked).length;
  document.getElementById('hcount').textContent=n+' checked';
  document.getElementById('binfo').innerHTML=n===0?'Tap items to add to order':'<strong>'+n+' item'+(n===1?'':'s')+'</strong> ready to send';
  document.getElementById('copyBtn').disabled=n===0;
}
function getListText(){
  let out='DIAMOND SLICE ORDER LIST\n';
  SECTIONS.forEach((sec,si)=>{
    const lines=[];
    sec.items.forEach((item,ii)=>{
      const st=state[key(si,ii)];
      if(st&&st.checked)lines.push('• '+item+(st.qty>1?' x'+st.qty:''));
    });
    if(lines.length){out+='\n'+sec.name.toUpperCase()+'\n'+lines.join('\n')+'\n';}
  });
  return out.trim();
}
function copyList(){
  const text=getListText(),btn=document.getElementById('copyBtn');
  if(navigator.share){navigator.share({text}).catch(()=>fallbackCopy(text,btn));}
  else{fallbackCopy(text,btn);}
}
function fallbackCopy(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.innerHTML='✓ Copied!';btn.classList.add('ok');
    setTimeout(()=>{btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy & Send';btn.classList.remove('ok');},2500);
  });
}
function resetAll(){
  if(!confirm('Clear everything and start fresh?'))return;
  state={};save();render();
}
render();
</script>
</body>
</html>
